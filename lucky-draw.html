<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>행운의 뽑기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: url(./img/bg.png) repeat;
            background-size: 100%;
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 1080px;
            height: 1920px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* ── Title ── */
        .title-wrap {
            position: relative;
            width: 960px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .deco-star {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 1;
            filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
        }
        .deco-1 { top: 10px; left: 50px; transform: rotate(-15deg); }
        .deco-2 { top: 30px; right: 40px; transform: rotate(20deg); }

        .title-block { text-align: center; position: relative; z-index: 2; }
        .title-sub {
            display: inline-block;
            background: #3F1F0E;
            color: #FFD93B;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            padding: 6px 24px;
            border-radius: 999px;
            margin-bottom: 14px;
        }
        .title-main {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .tword {
            font-family: 'Black Han Sans', 'Pretendard', sans-serif;
            font-size: 140px;
            line-height: 0.95;
            color: #FFD93B;
            -webkit-text-stroke: 6px #3F1F0E;
            paint-order: stroke fill;
            text-shadow: 6px 6px 0 #3F1F0E, 6px 12px 0 rgba(0,0,0,0.25);
            letter-spacing: -4px;
            transform: rotate(-3deg);
        }
        .tword-2 {
            color: #E85342;
            transform: rotate(3deg) translateY(8px);
        }
        .title-tag {
            margin-top: 14px;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 3px 0 rgba(0,0,0,0.4);
            letter-spacing: -1px;
        }

        /* ── Prize chips ── */
        .prize-chips {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            width: 1000px;
            margin-bottom: 26px;
        }
        .prize-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #F5EBDA;
            border: 4px solid #3F1F0E;
            border-radius: 18px;
            padding: 10px 4px 12px;
            box-shadow: 0 6px 0 #3F1F0E;
        }
        .chip-img-wrap {
            width: 110px;
            height: 110px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #3F1F0E;
            background: #fff;
        }
        .chip-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .chip-name {
            font-size: 21px;
            font-weight: 800;
            color: #3F1F0E;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        /* ── 9×9 grid ── */
        .lottery-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 10px;
            width: 1000px;
        }
        .slot {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .slot-back, .slot-front {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .slot-back {
            background: #F5EBDA;
            border: 3px solid #3F1F0E;
            box-shadow: 0 4px 0 rgba(63, 31, 14, 0.35), inset 0 2px 0 rgba(255,255,255,0.5);
            z-index: 2;
        }
        .slot-stripes {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent 0 6px,
                rgba(232, 83, 66, 0.22) 6px 10px
            );
        }
        .slot-q {
            font-family: 'Black Han Sans', 'Pretendard', sans-serif;
            font-size: 38px;
            color: #3F1F0E;
            line-height: 1;
            position: relative;
            z-index: 2;
        }
        .slot-num {
            position: absolute;
            top: 4px; left: 6px;
            font-size: 11px;
            font-weight: 900;
            color: #3F1F0E;
            z-index: 2;
        }
        .slot-front {
            border: 3px solid;
            padding: 4px;
        }
        .slot-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .slot.opened .slot-back { display: none; }
        .slot.tearing .slot-back {
            animation: tearAway 0.6s cubic-bezier(0.33, 1, 0.68, 1) forwards;
        }
        @keyframes tearAway {
            0%   { transform: translateY(0) rotate(0) scale(1); opacity: 1; clip-path: inset(0 0 0 0); }
            30%  { transform: translateY(-30px) rotate(-3deg) scale(1.05); opacity: 1; clip-path: inset(20% 0 0 0); }
            100% { transform: translateY(-300px) rotate(-12deg) scale(1.1); opacity: 0; clip-path: inset(60% 0 0 0); }
        }

        /* ── Bottom logo / notice ── */
        .deco-bottom {
            position: absolute; bottom: 0; left: 0;
            width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            pointer-events: none;
        }
        .deco-bottom .deco-logo { width: 60%; max-width: 540px; margin-bottom: 24px; }
        .deco-bottom .deco-notice { width: 100%; }

        /* ── Result popup ── */
        #result-overlay {
            position: absolute; top: 0; left: 0;
            width: 1080px; height: 1920px;
            background: rgba(0,0,0,0.65);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #result-overlay.hidden { display: none; }

        #confetti-canvas {
            position: absolute; top: 0; left: 0;
            width: 1080px; height: 1920px;
            pointer-events: none; z-index: 201;
        }

        .result-card {
            width: 820px;
            background: #F5EBDA;
            border: 8px solid #3F1F0E;
            border-radius: 48px;
            padding: 60px 60px 56px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 16px 0 rgba(63,31,14,0.4);
            position: relative; z-index: 202;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            from { transform: scale(0.6) rotate(-3deg); opacity: 0; }
            to   { transform: scale(1) rotate(0); opacity: 1; }
        }
        .result-badge {
            background: #E85342;
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            padding: 10px 36px;
            border-radius: 999px;
            border: 4px solid #3F1F0E;
            margin-bottom: 24px;
            box-shadow: 0 6px 0 #3F1F0E;
            letter-spacing: 0.5px;
        }
        .result-char-wrap {
            width: 380px; height: 380px;
            border-radius: 50%;
            background: #fff;
            border: 6px solid #3F1F0E;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.08);
        }
        .result-char {
            width: 92%; height: 92%; object-fit: contain;
            animation: bob 1.6s ease-in-out infinite alternate;
        }
        @keyframes bob {
            from { transform: translateY(0) rotate(-2deg); }
            to   { transform: translateY(-12px) rotate(2deg); }
        }
        .result-name {
            font-family: 'Black Han Sans', 'Pretendard', sans-serif;
            font-size: 88px;
            color: #3F1F0E;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .result-desc {
            font-size: 30px;
            color: #5A3318;
            margin-bottom: 36px;
            text-align: center;
        }
        .result-confirm {
            width: 480px; height: 110px;
            background: #2BA876;
            border: 5px solid #3F1F0E;
            border-radius: 999px;
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            font-size: 44px; font-weight: 900;
            letter-spacing: -1px;
            cursor: pointer;
            box-shadow: 0 8px 0 #3F1F0E;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .result-confirm:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #3F1F0E;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Title -->
    <div class="title-wrap">
        <svg class="deco-star deco-1" viewBox="0 0 40 40">
            <path d="M20 2 L24 16 L38 18 L27 27 L31 40 L20 32 L9 40 L13 27 L2 18 L16 16 Z" fill="#FFD93B" stroke="#3F1F0E" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
        <svg class="deco-star deco-2" viewBox="0 0 40 40">
            <path d="M20 2 L24 16 L38 18 L27 27 L31 40 L20 32 L9 40 L13 27 L2 18 L16 16 Z" fill="#E85342" stroke="#3F1F0E" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
        <div class="title-block">
            <div class="title-sub">LUCKY DRAW</div>
            <div class="title-main">
                <span class="tword">행운의</span>
                <span class="tword tword-2">뽑기</span>
            </div>
            <div class="title-tag">81칸 중 한 칸을 골라 행운을 뜯어보세요!</div>
        </div>
    </div>

    <div class="prize-chips" id="prizeChips"></div>

    <div class="lottery-grid" id="lotteryGrid"></div>

    <!-- Result overlay -->
    <div id="result-overlay" class="hidden">
        <canvas id="confetti-canvas" width="1080" height="1920"></canvas>
        <div class="result-card">
            <div class="result-badge">🎉 당첨!</div>
            <div class="result-char-wrap">
                <img class="result-char" id="resultChar" src="" alt="" />
            </div>
            <div class="result-name" id="resultName">스티커</div>
            <div class="result-desc" id="resultDesc">카운터에서 수령하세요</div>
            <button class="result-confirm" id="confirmBtn">확인</button>
        </div>
    </div>

    <div class="deco-bottom">
        <img class="deco-notice" src="./img/notice.svg" alt="notice" />
    </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
var PRIZES = [
    { id:'sticker',   name:'스티커',        short:'스티커',  count:62, desc:'카운터에서 수령하세요',         char:'noo_pink',   color:'#F1C8C8' },
    { id:'coupon20',  name:'20% 할인쿠폰',  short:'20%쿠폰', count:5,  desc:'구매 시 사용 가능합니다',       char:'noo_pink',   color:'#E85342' },
    { id:'fragrance', name:'방향제',        short:'방향제',  count:5,  desc:'카운터에서 수령하세요',         char:'noo_blue',   color:'#1E76C9' },
    { id:'coin',      name:'인형뽑기 코인', short:'뽑기코인',count:4,  desc:'인형뽑기 기계에서 사용하세요',  char:'noo_gray',   color:'#C9C2BA' },
    { id:'fan',       name:'부채',          short:'부채',    count:3,  desc:'카운터에서 수령하세요',         char:'noo_blue',   color:'#1E76C9' },
    { id:'coupon30',  name:'30% 할인쿠폰',  short:'30%쿠폰', count:2,  desc:'구매 시 사용 가능합니다',       char:'noo_golden', color:'#F8E22B' },
];

var STORAGE_KEY = 'lfs_draw_session';

// ── Board ──────────────────────────────────────────────────────────────────
function buildPool() {
    var pool = [];
    PRIZES.forEach(function(p) {
        for (var i = 0; i < p.count; i++) pool.push(p.id);
    });
    return shuffle(pool);
}
function createState() {
    var pool = buildPool();
    return {
        slots: pool.map(function(prizeId, i) {
            return { num: i + 1, prizeId: prizeId, opened: false };
        })
    };
}
function loadState() {
    try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null'); }
    catch(e) { return null; }
}
function saveState() {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
}
function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
}
function getPrize(id) {
    for (var i = 0; i < PRIZES.length; i++) {
        if (PRIZES[i].id === id) return PRIZES[i];
    }
    return null;
}

// ── Render: chips ─────────────────────────────────────────────────────────
function renderPrizeChips() {
    var container = document.getElementById('prizeChips');
    while (container.firstChild) container.removeChild(container.firstChild);

    PRIZES.forEach(function(p) {
        var chip = document.createElement('div');
        chip.className = 'prize-chip';

        var imgWrap = document.createElement('div');
        imgWrap.className = 'chip-img-wrap';

        var img = document.createElement('img');
        img.className = 'chip-img';
        img.src = './img/' + p.char + '_crop.png';
        img.alt = '';

        imgWrap.appendChild(img);

        var name = document.createElement('div');
        name.className = 'chip-name';
        name.textContent = p.name;

        chip.appendChild(imgWrap);
        chip.appendChild(name);
        container.appendChild(chip);
    });
}

// ── Render: grid ──────────────────────────────────────────────────────────
function renderGrid() {
    var grid = document.getElementById('lotteryGrid');
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    gameState.slots.forEach(function(slot, idx) {
        var prize = getPrize(slot.prizeId);

        var el = document.createElement('div');
        el.className = 'slot' + (slot.opened ? ' opened' : '');

        // Back
        var back = document.createElement('div');
        back.className = 'slot-back';

        var num = document.createElement('div');
        num.className = 'slot-num';
        num.textContent = slot.num;

        var stripes = document.createElement('div');
        stripes.className = 'slot-stripes';

        var q = document.createElement('div');
        q.className = 'slot-q';
        q.textContent = '?';

        back.appendChild(num);
        back.appendChild(stripes);
        back.appendChild(q);

        // Front (revealed)
        var front = document.createElement('div');
        front.className = 'slot-front';
        front.style.background = prize.color + '22';
        front.style.borderColor = prize.color;

        var fImg = document.createElement('img');
        fImg.src = './img/' + prize.char + '_crop.png';
        fImg.alt = '';
        front.appendChild(fImg);

        el.appendChild(back);
        el.appendChild(front);

        if (!slot.opened) {
            (function(i, elem) {
                elem.addEventListener('click', function() { onSlotClick(i, elem); });
            })(idx, el);
        }

        grid.appendChild(el);
    });
}

// ── Slot click → tear-up animation → result ──────────────────────────────
var isAnimating = false;

function onSlotClick(idx, el) {
    if (isAnimating) return;
    var slot = gameState.slots[idx];
    if (slot.opened) return;

    isAnimating = true;
    el.classList.add('tearing');

    setTimeout(function() {
        slot.opened = true;
        saveState();
        el.classList.remove('tearing');
        el.classList.add('opened');

        setTimeout(function() { showResult(slot.prizeId); }, 250);
    }, 600);
}

// ── Result ────────────────────────────────────────────────────────────────
function showResult(prizeId) {
    var prize = getPrize(prizeId);
    document.getElementById('resultChar').src = './img/' + prize.char + '_crop.png';
    document.getElementById('resultName').textContent = prize.name;
    document.getElementById('resultDesc').textContent = prize.desc;
    document.getElementById('result-overlay').classList.remove('hidden');
    startConfetti();
}

document.getElementById('confirmBtn').addEventListener('click', function() {
    document.getElementById('result-overlay').classList.add('hidden');
    stopConfetti();
    isAnimating = false;

    var allOpened = true;
    for (var i = 0; i < gameState.slots.length; i++) {
        if (!gameState.slots[i].opened) { allOpened = false; break; }
    }
    if (allOpened) {
        gameState = createState();
        saveState();
        renderGrid();
    }
});

// ── Confetti ──────────────────────────────────────────────────────────────
var CC = ['#FFD93B','#E85342','#2BA876','#1E76C9','#F8E22B','#fff','#F1C8C8'];
var confettiRAF = null;

function startConfetti() {
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var pieces = [];
    for (var i = 0; i < 120; i++) {
        pieces.push({
            x: Math.random()*1080, y: -30-Math.random()*300,
            w: 10+Math.random()*14, h: 5+Math.random()*8,
            rot: Math.random()*Math.PI*2, drot: (Math.random()-0.5)*0.16,
            vx: (Math.random()-0.5)*5, vy: 5+Math.random()*5,
            color: CC[Math.floor(Math.random()*CC.length)]
        });
    }
    function tick() {
        ctx.clearRect(0, 0, 1080, 1920);
        pieces.forEach(function(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.rect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.fill();
            ctx.restore();
            p.x += p.vx; p.y += p.vy; p.rot += p.drot;
            if (p.y > 1950) { p.y = -30; p.x = Math.random()*1080; }
        });
        confettiRAF = requestAnimationFrame(tick);
    }
    tick();
}
function stopConfetti() {
    if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
    document.getElementById('confetti-canvas').getContext('2d').clearRect(0, 0, 1080, 1920);
}

// ── Init ──────────────────────────────────────────────────────────────────
var gameState = loadState() || createState();
saveState();
renderPrizeChips();
renderGrid();
</script>
</body>
</html>
