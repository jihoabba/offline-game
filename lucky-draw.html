<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>행운의 뽑기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: url(./img/bg.png) repeat;
            background-size: 100%;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 1080px;
            height: 1920px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* ── 제목 ── */
        .board-title {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            text-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 0 50px rgba(248,59,170,0.4);
            margin-bottom: 20px;
        }

        /* ── 경품 칩 ── */
        .prize-chips {
            display: flex;
            gap: 10px;
            width: 960px;
            margin-bottom: 24px;
        }

        .prize-chip {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.13);
            border: 1.5px solid rgba(255,255,255,0.26);
            border-radius: 16px;
            padding: 12px 6px 10px;
            color: #fff;
        }

        .chip-icon { font-size: 28px; line-height: 1; }

        .chip-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.2px;
            text-align: center;
            white-space: nowrap;
            color: rgba(255,255,255,0.9);
        }

        /* ── 9×9 그리드 ── */
        .lottery-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 9px;
            width: 960px;
        }

        /* ── 슬롯 ── */
        .slot {
            aspect-ratio: 1;
            perspective: 500px;
            -webkit-tap-highlight-color: transparent;
        }
        .slot:not(.opened) { cursor: pointer; }

        .slot-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.42s cubic-bezier(0.4,0,0.2,1);
            border-radius: 10px;
        }
        .slot.opened .slot-inner { transform: rotateY(180deg); }

        .slot-back, .slot-front {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 닫힌 면 — 문방구 뽑기 티켓 */
        .slot-back {
            background: linear-gradient(155deg, #fffde7, #ffe57f);
            border: 2px solid rgba(210,160,0,0.28);
            box-shadow: 0 3px 8px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.85);
            gap: 3px;
        }
        .slot:not(.opened):active .slot-back {
            background: linear-gradient(155deg, #fff9c4, #ffd740);
            border-color: rgba(210,160,0,0.6);
        }
        .slot-q   { font-size: 24px; line-height: 1; }
        .slot-num { font-size: 13px; font-weight: 700; color: rgba(150,100,0,0.5); line-height: 1; }

        /* 열린 면 */
        .slot-front { transform: rotateY(180deg); padding: 4px; gap: 3px; }
        .s-icon { font-size: 26px; line-height: 1; }
        .s-name { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.2; letter-spacing: -0.2px; }

        /* 경품별 색상 */
        .p-sticker   { background: linear-gradient(135deg,#e8f5e9,#c8e6c9); color: #1b5e20; }
        .p-coupon20  { background: linear-gradient(135deg,#ede7f6,#d1c4e9); color: #311b92; }
        .p-fragrance { background: linear-gradient(135deg,#fce4ec,#f8bbd0); color: #880e4f; }
        .p-coin      { background: linear-gradient(135deg,#fff8e1,#ffe082); color: #bf360c; }
        .p-fan       { background: linear-gradient(135deg,#e3f2fd,#bbdefb); color: #0d47a1; }
        .p-coupon30  { background: linear-gradient(135deg,#fbe9e7,#ffccbc); color: #b71c1c; }

        @keyframes slotGlow {
            0%   { box-shadow: 0 0  0   rgba(255,220,0,0); }
            40%  { box-shadow: 0 0 30px rgba(255,220,0,1), 0 0 55px rgba(255,220,0,0.55); }
            100% { box-shadow: 0 0 10px rgba(255,220,0,0.25); }
        }
        .slot.just-opened .slot-front { animation: slotGlow 1.3s ease-out forwards; }

        /* ── 하단 데코 ── */
        .deco-bottom {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 620px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            pointer-events: none;
        }
        .deco-bottom .deco-logo { width: 75%; max-width: 640px; margin-bottom: 40px; }
        .deco-bottom .deco-notice { width: 100%; }

        /* ── 결과 오버레이 ── */
        #result-overlay {
            position: absolute; top: 0; left: 0;
            width: 1080px; height: 1920px;
            background: rgba(0,0,0,0.72);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        #result-overlay.hidden { display: none; }

        #confetti-canvas {
            position: absolute; top: 0; left: 0;
            width: 1080px; height: 1920px;
            pointer-events: none; z-index: 201;
        }

        .result-card {
            width: 860px;
            background: #fff;
            border-radius: 48px;
            padding: 72px 60px 64px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            position: relative; z-index: 202;
            animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .result-badge {
            background: linear-gradient(135deg, #f83baa, #7c3eee);
            color: #fff; font-size: 28px; font-weight: 700;
            padding: 10px 34px; border-radius: 50px; margin-bottom: 36px;
            letter-spacing: 0.5px;
        }
        .result-icon {
            font-size: 150px; line-height: 1; margin-bottom: 24px;
            animation: floatBounce 0.9s ease-in-out infinite alternate;
        }
        @keyframes floatBounce {
            from { transform: translateY(0) rotate(-4deg); }
            to   { transform: translateY(-22px) rotate(4deg); }
        }
        .result-name {
            font-size: 76px; font-weight: 900; color: #111;
            letter-spacing: -1.5px; text-align: center; margin-bottom: 14px;
        }
        .result-desc {
            font-size: 30px; color: #888;
            text-align: center; letter-spacing: -0.3px; margin-bottom: 62px;
        }
        .result-confirm {
            width: 440px; height: 104px;
            background: linear-gradient(135deg, #f83baa, #7c3eee);
            border: none; border-radius: 52px;
            color: #fff; font-size: 44px; font-weight: 900; letter-spacing: -0.5px;
            font-family: 'Pretendard', sans-serif; cursor: pointer;
            box-shadow: 0 10px 34px rgba(248,59,170,0.45);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .result-confirm:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="container">

    <div class="board-title">행운의 뽑기</div>

    <div class="prize-chips" id="prizeChips"></div>

    <div class="lottery-grid" id="lotteryGrid"></div>

    <!-- 결과 오버레이 -->
    <div id="result-overlay" class="hidden">
        <canvas id="confetti-canvas" width="1080" height="1920"></canvas>
        <div class="result-card">
            <div class="result-badge">🎉 당첨!</div>
            <div class="result-icon" id="resultIcon">⭐</div>
            <div class="result-name" id="resultName">스티커</div>
            <div class="result-desc" id="resultDesc">카운터에서 수령하세요</div>
            <button class="result-confirm" id="confirmBtn">확인</button>
        </div>
    </div>

    <div class="deco-bottom">
        <img class="deco-logo" src="./img/logo.png" alt="logo" />
        <img class="deco-notice" src="./img/notice.svg" alt="notice" />
    </div>

</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
// 81칸 비율 배분: 스티커 62 · 20%쿠폰 5 · 방향제 5 · 코인 4 · 부채 3 · 30%쿠폰 2
var PRIZES = [
    { id:'sticker',   name:'스티커',        short:'스티커',  icon:'⭐', count:62, desc:'카운터에서 수령하세요' },
    { id:'coupon20',  name:'20% 할인쿠폰',  short:'20%쿠폰', icon:'🎫', count:5,  desc:'구매 시 사용 가능합니다' },
    { id:'fragrance', name:'방향제',        short:'방향제',  icon:'🌸', count:5,  desc:'카운터에서 수령하세요' },
    { id:'coin',      name:'인형뽑기 코인', short:'뽑기코인',icon:'🪙', count:4,  desc:'인형뽑기 기계에서 사용하세요' },
    { id:'fan',       name:'부채',          short:'부채',    icon:'🌀', count:3,  desc:'카운터에서 수령하세요' },
    { id:'coupon30',  name:'30% 할인쿠폰',  short:'30%쿠폰', icon:'🎁', count:2,  desc:'구매 시 사용 가능합니다' },
];

var STORAGE_KEY = 'lfs_draw_session';

// ── BOARD GENERATION ──────────────────────────────────────────────────────
function buildPool() {
    var pool = [];
    PRIZES.forEach(function(p) {
        for (var i = 0; i < p.count; i++) pool.push(p.id);
    });
    return shuffle(pool);
}

function createState() {
    var pool = buildPool();
    return {
        slots: pool.map(function(prizeId, i) {
            return { num: i + 1, prizeId: prizeId, opened: false };
        })
    };
}

// ── PERSISTENCE (sessionStorage → 새로고침 시 초기화) ─────────────────────
function loadState() {
    try {
        return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null');
    } catch(e) { return null; }
}

function saveState() {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
}

function getPrize(id) {
    for (var i = 0; i < PRIZES.length; i++) {
        if (PRIZES[i].id === id) return PRIZES[i];
    }
    return null;
}

// ── RENDER: 경품 칩 ───────────────────────────────────────────────────────
function renderPrizeChips() {
    var container = document.getElementById('prizeChips');
    while (container.firstChild) container.removeChild(container.firstChild);

    PRIZES.forEach(function(p) {
        var chip = document.createElement('div');
        chip.className = 'prize-chip';

        var icon = document.createElement('div');
        icon.className = 'chip-icon';
        icon.textContent = p.icon;

        var name = document.createElement('div');
        name.className = 'chip-name';
        name.textContent = p.name;

        chip.appendChild(icon);
        chip.appendChild(name);
        container.appendChild(chip);
    });
}

// ── RENDER: 보드 ──────────────────────────────────────────────────────────
function renderGrid() {
    var grid = document.getElementById('lotteryGrid');
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    gameState.slots.forEach(function(slot, idx) {
        var prize = getPrize(slot.prizeId);

        var el = document.createElement('div');
        el.className = 'slot' + (slot.opened ? ' opened' : '');

        var inner = document.createElement('div');
        inner.className = 'slot-inner';

        // 닫힌 면
        var back = document.createElement('div');
        back.className = 'slot-back';
        var q = document.createElement('div');
        q.className = 'slot-q';
        q.textContent = '🎰';
        var num = document.createElement('div');
        num.className = 'slot-num';
        num.textContent = slot.num;
        back.appendChild(q);
        back.appendChild(num);

        // 열린 면
        var front = document.createElement('div');
        front.className = 'slot-front p-' + slot.prizeId;
        var sIcon = document.createElement('div');
        sIcon.className = 's-icon';
        sIcon.textContent = prize.icon;
        var sName = document.createElement('div');
        sName.className = 's-name';
        sName.textContent = prize.short;
        front.appendChild(sIcon);
        front.appendChild(sName);

        inner.appendChild(back);
        inner.appendChild(front);
        el.appendChild(inner);

        if (!slot.opened) {
            (function(i, elem) {
                elem.addEventListener('click', function() { onSlotClick(i, elem); });
            })(idx, el);
        }

        grid.appendChild(el);
    });
}

// ── SLOT CLICK ────────────────────────────────────────────────────────────
var isAnimating = false;

function onSlotClick(idx, el) {
    if (isAnimating) return;
    var slot = gameState.slots[idx];
    if (slot.opened) return;

    isAnimating = true;
    slot.opened = true;
    saveState();

    el.classList.add('opened', 'just-opened');

    setTimeout(function() { showResult(slot.prizeId); }, 550);
}

// ── RESULT ────────────────────────────────────────────────────────────────
function showResult(prizeId) {
    var prize = getPrize(prizeId);
    document.getElementById('resultIcon').textContent = prize.icon;
    document.getElementById('resultName').textContent = prize.name;
    document.getElementById('resultDesc').textContent = prize.desc;
    document.getElementById('result-overlay').classList.remove('hidden');
    startConfetti();
}

document.getElementById('confirmBtn').addEventListener('click', function() {
    document.getElementById('result-overlay').classList.add('hidden');
    stopConfetti();
    isAnimating = false;

    // 81칸 전부 열렸으면 새 보드 자동 생성 (같은 세션 안에서)
    var allOpened = true;
    for (var i = 0; i < gameState.slots.length; i++) {
        if (!gameState.slots[i].opened) { allOpened = false; break; }
    }
    if (allOpened) {
        gameState = createState();
        saveState();
        renderGrid();
    }
});

// ── CONFETTI ──────────────────────────────────────────────────────────────
var CC = ['#f83baa','#7c3eee','#ffe84d','#4db848','#4fc3f7','#ff8a65','#fff'];
var confettiRAF = null;

function startConfetti() {
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var pieces = [];
    for (var i = 0; i < 120; i++) {
        pieces.push({
            x: Math.random()*1080, y: -30-Math.random()*300,
            w: 10+Math.random()*14, h: 5+Math.random()*8,
            rot: Math.random()*Math.PI*2, drot: (Math.random()-0.5)*0.16,
            vx: (Math.random()-0.5)*5, vy: 5+Math.random()*5,
            color: CC[Math.floor(Math.random()*CC.length)]
        });
    }
    function tick() {
        ctx.clearRect(0, 0, 1080, 1920);
        pieces.forEach(function(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.rect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.fill();
            ctx.restore();
            p.x += p.vx; p.y += p.vy; p.rot += p.drot;
            if (p.y > 1950) { p.y = -30; p.x = Math.random()*1080; }
        });
        confettiRAF = requestAnimationFrame(tick);
    }
    tick();
}

function stopConfetti() {
    if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
    document.getElementById('confetti-canvas').getContext('2d').clearRect(0, 0, 1080, 1920);
}

// ── INIT ──────────────────────────────────────────────────────────────────
var gameState = loadState() || createState();
saveState();
renderPrizeChips();
renderGrid();
</script>
</body>
</html>
